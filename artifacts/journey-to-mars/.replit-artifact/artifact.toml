kind = "web"
previewPath = "/"
title = "Journey to Mars"
version = "1.0.0"
id = "artifacts/journey-to-mars"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20159

[services.development]
run = "pnpm --filter @workspace/journey-to-mars run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/journey-to-mars", "run", "build" ]
publicDir = "artifacts/journey-to-mars/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20159"
BASE_PATH = "/"
